workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
      vars:
        PACKAGE_NAME: "com.studentsphere.app"
    scripts:
      - name: Install Node dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Make Gradle wrapper executable
        script: chmod +x android/gradlew

      - name: Build Android debug APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - minhajulislamrifat43@gmail.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 22.0.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.studentsphere.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      # Add these in Codemagic Environment Variables settings:
      # APP_STORE_CONNECT_ISSUER_ID
      # APP_STORE_CONNECT_KEY_IDENTIFIER
      # APP_STORE_CONNECT_PRIVATE_KEY
      # CERTIFICATE_PRIVATE_KEY
    scripts:
      - name: Install Node dependencies
        script: npm install

      - name: Install Capacitor iOS package
        script: npm install @capacitor/ios

      - name: Build web assets
        script: npm run build

      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli

      - name: Add iOS platform
        script: npx cap add ios || true

      - name: Sync Capacitor to iOS
        script: npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          if [ -f "ios/App/Podfile" ]; then
            cd ios/App && pod install --repo-update
          else
            echo "No Podfile found, skipping pod install"
          fi

      - name: Set up code signing (automatic)
        script: |
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -not -path "*/xcuserdata/*" | head -1)
          SCHEME=$(find ios -name "*.xcscheme" -not -path "*/xcuserdata/*" | head -1 | xargs basename | sed 's/.xcscheme//')
          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - minhajulislamrifat43@gmail.com
        notify:
          success: true
          failure: true
      # Uncomment below to publish to TestFlight after successful build:
      # app_store_connect:
      #   auth: integration
      #   submit_to_testflight: true
