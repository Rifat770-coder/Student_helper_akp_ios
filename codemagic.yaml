workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
      vars:
        PACKAGE_NAME: "com.studentsphere.app"
    scripts:
      - name: Install Node dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Make Gradle wrapper executable
        script: chmod +x android/gradlew

      - name: Build Android debug APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - minhajulislamrifat43@gmail.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 22.0.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.studentsphere.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      # Add these in Codemagic Environment Variables settings:
      # APP_STORE_CONNECT_ISSUER_ID
      # APP_STORE_CONNECT_KEY_IDENTIFIER
      # APP_STORE_CONNECT_PRIVATE_KEY
      # CERTIFICATE_PRIVATE_KEY
    scripts:
      - name: Install Node dependencies
        script: |
          npm install
          npm install @capacitor/ios --save

      - name: Build web assets
        script: npm run build

      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli

      - name: Add and Sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
          echo "=== Checking ios/App folder ==="
          ls -la ios/App/ || echo "ios/App not found"
          find ios -name "Podfile" || echo "No Podfile"

      - name: Install CocoaPods dependencies
        script: |
          if [ ! -f "ios/App/Podfile" ]; then
            echo "Podfile missing — creating one..."
            mkdir -p ios/App
            cat > ios/App/Podfile << 'EOF'
          platform :ios, '16.0'
          use_frameworks!

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          fi
          cd ios/App
          pod install --repo-update

      - name: Build iOS IPA
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination generic/platform=iOS \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            archive | xcpretty
          mkdir -p $CM_BUILD_DIR/ipa
          cd $CM_BUILD_DIR
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportPath ipa \
            -exportOptionsPlist /Users/builder/export_options.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO || true
          # Fallback: extract .app from archive directly
          find App.xcarchive -name "*.app" -exec cp -r {} ipa/ \; || true

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - $CM_BUILD_DIR/ipa/*.app
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - minhajulislamrifat43@gmail.com
        notify:
          success: true
          failure: true
      # Uncomment below to publish to TestFlight after successful build:
      # app_store_connect:
      #   auth: integration
      #   submit_to_testflight: true
